name: Metrics

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate GitHub metrics
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: CastilloDevX
          template: classic
          base: header, activity, community, repositories, metadata

          config_timezone: America/Mexico_City

          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300

          plugin_followup: yes
          plugin_followup_sections: repositories, user

          plugin_topics: yes
          plugin_topics_limit: 12
          plugin_topics_mode: starred

          plugin_stars: yes

          plugin_repositories: yes
          plugin_repositories_featured: CastilloDevX/MiniDBeaver,CastilloDevX/SaludPlus,CastilloDevX/SpaceVision,CastilloDevX/PIA-Equipo-2,CastilloDevX/movikoox,CastilloDevX/ploostream